name: Build Custom LiteRT-LM (Android ARM64)

on:
  push:
    branches: [ "main", "lfm-hybrid-engine" ]
  workflow_dispatch:

jobs:
  build-android-so:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & NDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      # FIXED: Using the official 'litertlm-android' target
      - name: Build Android Target
        run: |
          bazel build -c opt --config=android_arm64 //kotlin/java/com/google/ai/edge/litertlm:litertlm-android

      # FIXED: Dynamically harvest all compiled .so files from the bazel-bin output tree
      - name: Extract .so files
        run: |
          mkdir -p extracted_so
          find bazel-bin/ -name "*.so" -exec cp {} extracted_so/ \;
          ls -lh extracted_so/

      - name: Upload .so Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litertlm-arm64-v8a-so-files
          path: extracted_so/*.so
