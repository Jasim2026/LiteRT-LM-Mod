name: Build Custom LiteRT-LM (Android ARM64)

on:
  push:
    branches: [ "main", "lfm-hybrid-engine" ]
  workflow_dispatch:

jobs:
  build-android-so:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & NDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      # FIXED: Added the '...' wildcard to compile both Kotlin AND native JNI layers
      - name: Build Android Target
        run: |
          bazel build -c opt --config=android_arm64 //kotlin/java/com/google/ai/edge/litertlm/...

      # FIXED: Search ONLY bazel-bin (with symlinks followed) to eliminate toolchain cache bloat
      - name: Extract .so files
        run: |
          mkdir -p extracted_so
          
          # Search following symlinks ONLY in target output directory
          find -L bazel-bin/ -name "*.so" -exec cp {} extracted_so/ \;
          
          # List the harvested files
          ls -lh extracted_so/

      - name: Upload .so Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litertlm-arm64-v8a-so-files
          path: extracted_so/*.so
