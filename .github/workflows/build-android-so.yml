name: Build Custom LiteRT-LM (Android ARM64)

on:
  push:
    branches: [ "main", "lfm-hybrid-engine" ]
  workflow_dispatch:

jobs:
  build-android-so:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & NDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      # FIXED: Using the official Bazelisk GitHub action instead of NPM
      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Build Android AAR (ARM64)
        run: |
          bazel build -c opt --config=android_arm64 //kotlin/java/com/google/ai/edge/litertlm:litertlm_aar

      - name: Extract .so files from AAR
        run: |
          mkdir -p extracted_so
          unzip bazel-bin/kotlin/java/com/google/ai/edge/litertlm/litertlm_aar.aar -d aar_out
          cp aar_out/jni/arm64-v8a/*.so extracted_so/

      - name: Upload .so Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: litertlm-arm64-v8a-so-files
          path: extracted_so/*.so
